<div class="h-screen flex">
  <div class="flex flex-1 items-center justify-center">

    <div class="space-y-4 w-96">
      <public-header />

      <ui-input
        [(ngModel)]="username"
        type="text"
        label="Email/Username"
        placeholder="example@email.com"
      >
        <div leading class="hover:opacity-75 mr-2 my-auto">
          <svg lucideAtSign color="white" [size]="20"></svg>
        </div>
      </ui-input>


      <div>
        <ui-input
          [(ngModel)]="password"
          type="password"
          label="Password"
          placeholder="°°°°°°°"
        >
          <div leading class="hover:opacity-75 mr-2 my-auto">
            <svg lucideKey color="white" [size]="20"></svg>
          </div>
        </ui-input>

        <a class="primary-link text-end block text-sm mt-1" href="/auth/forgot-password">
          Forgot password?
        </a>
      </div>

      <ui-button
        type="primary"
        additionalNgClass="w-full"
        (onClick)="login()"
        [loading]="isLoading()"
        [disabled]="!username || !password"
      >
        Login
      </ui-button>

      <ui-delimiter />

      <p class="text-center">Don't have an account?
        <a href="/auth/sign-up" class="primary-link">&nbsp;create one</a>
        <span class="text-white">&ensp;for free</span>
      </p>
    </div>

  </div>
</div>
