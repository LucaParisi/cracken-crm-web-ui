<div class="h-screen flex">
  <div class="rounded-full bg-teal-500">
    <svg lucideChevronLeft color="white"/>
  </div>

  <div class="flex flex-1 items-center justify-center">
    <div class="space-y-4 w-125">
      <img
        ngSrc="favicon.png"
        class="mx-auto"
        [height]="250"
        [width]="250"
        draggable="false"
        alt="cracken-crm-logo"
      />
      <h1 class="font-bold text-4xl text-center">Sign-up to Cracken</h1>

      <label for="firstName">First Name</label>
      <div class="flex flex-row gap-x-3 bg-zinc-500 rounded-md">
        <div class="border-r border-r-zinc-800 p-3 hover:opacity-75">
          <svg lucideUserRoundPen color="white"></svg>
        </div>
        <input id="firstName" type="text" class="p-3 w-full" placeholder="John" [(ngModel)]="newUser.firstName"/>
      </div>

      <label for="lastName">Last Name</label><
      <div class="flex flex-row gap-x-3 bg-zinc-500 rounded-md">
        <div class="border-r border-r-zinc-800 p-3 hover:opacity-75">
          <svg lucideUserRoundPen color="white"></svg>
        </div>
        <input id="lastName" type="text" class="p-3 w-full" placeholder="Doe" [(ngModel)]="newUser.lastName"/>
      </div>

      <label for="email">Email</label>
      <div class="flex flex-row gap-x-3 bg-zinc-500 rounded-md">
        <div class="border-r border-r-zinc-800 p-3 hover:opacity-75">
          <svg lucideUserRoundPen color="white"></svg>
        </div>
        <input id="email" type="email" class="p-3 w-full" placeholder="john.doe@example.com" [(ngModel)]="newUser.email"/>
      </div>

      <div class="flex flex-row justify-between content-between">

      </div>
    </div>
  </div>
</div>
