<public-header title="OTP Verification" />

<div class="space-y-4 w-96">
  <ui-input
    [(ngModel)]="otp"
    type="text"
    label="OTP"
    placeholder="°°°°°°°"
  >
    <div leading class="hover:opacity-75 mr-2 my-auto">
      <svg lucideShieldHalf color="white" [size]="20"></svg>
    </div>
  </ui-input>

  <ui-delimiter />

  <ui-button
    type="primary"
    [disabled]="!!otp"
    (onClick)="handleNext()"
    [loading]="isLoading"
    additionalNgClass="w-full"
  >
    Next
  </ui-button>
</div>
