<public-header title="Reset Password" />

<div class="space-y-4 w-96">
  <ui-input
    [(ngModel)]="username"
    type="text"
    label="Email/Username"
    placeholder="example@email.com"
  >
    <div leading class="hover:opacity-75 mr-2 my-auto">
      <svg lucideAtSign color="white" [size]="20"></svg>
    </div>
  </ui-input>

  <ui-input
    [(ngModel)]="oldPassword"
    type="password"
    label="Old Password"
    placeholder="°°°°°°°"
  >
    <div leading class="hover:opacity-75 mr-2 my-auto">
      <svg lucideKey color="white" [size]="20"></svg>
    </div>
  </ui-input>

  <ui-input
    [(ngModel)]="newPassword"
    type="password"
    label="New Password"
    placeholder="°°°°°°°"
  >
    <div leading class="hover:opacity-75 mr-2 my-auto">
      <svg lucideKey color="white" [size]="20"></svg>
    </div>
  </ui-input>

  <ui-input
    [(ngModel)]="confirmPassword"
    type="password"
    label="Confirm Password"
    placeholder="°°°°°°°"
  >
    <div leading class="hover:opacity-75 mr-2 my-auto">
      <svg lucideKey color="white" [size]="20"></svg>
    </div>
  </ui-input>

  <ui-delimiter />

  <ui-button
    additionalNgClass="w-full"
    type="primary"
    [loading]="isLoading"
    [disabled]="disableNext"
    (onClick)="handleNext()" >
    Send OTP
  </ui-button>

</div>
